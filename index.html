<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACKEND DEV</title>
    <style>
        /* 영문 타이포그래피용 우아한 세리프 폰트와 한글 가독성용 프리텐다드 로드 */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-black: #000000;
            --text-white: #e0e0e0;
            --text-dim: #7a7a7a;
            --line-color: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
        }

        /* 배경 거대 텍스트 (사진 하단 OJOS 텍스트 모티브) */
        .bg-typography {
            position: fixed;
            bottom: -5vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-size: 25vw;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            letter-spacing: -0.05em;
        }

        /* 기하학적 배경 선 (사진 속 지그재그 선 모티브) */
        .graphic-line {
            position: fixed;
            width: 300px;
            height: 1px;
            background-color: var(--line-color);
            z-index: 0;
            transform: rotate(-35deg);
        }
        .line-1 { top: 20%; right: -50px; }
        .line-2 { bottom: 30%; left: -100px; width: 500px; }

        .container {
            display: flex;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1; /* 배경 위로 올림 */
        }

        /* 좌측 룩북 스타일 프로필 */
        aside.profile-area {
            width: 400px;
            padding: 80px 40px;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--line-color);
        }

        .profile-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.1;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
        }

        .profile-title span {
            color: var(--text-dim);
            font-size: 1.2rem;
            font-family: 'Pretendard', sans-serif;
            display: block;
            margin-top: 10px;
        }

        /* 이미지에 흑백, 대비 필터 적용하여 무드 맞춤 */
        .profile-visual {
            width: 100%;
            height: 350px;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.2) brightness(0.8);
            margin-bottom: 30px;
        }

        .profile-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.8;
            margin-bottom: auto;
            word-break: keep-all;
        }

        .social-links {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .social-links a {
            color: var(--text-white);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .social-links a:hover {
            border-bottom: 1px solid var(--text-white);
        }

        /* 우측 게시글 리스트 영역 */
        main.post-area {
            flex: 1;
            padding: 100px 80px;
        }

        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 50px 0;
            border-bottom: 1px solid var(--line-color);
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .post-item:hover {
            opacity: 0.6;
        }

        .post-meta {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            color: var(--text-dim);
            width: 120px;
            flex-shrink: 0;
        }

        .post-content {
            flex: 1;
            padding-right: 40px;
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 15px;
            letter-spacing: -0.03em;
        }

        .post-excerpt {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .post-thumbnail {
            width: 180px;
            height: 120px;
            background-color: #111;
            filter: grayscale(100%);
            object-fit: cover;
        }

        /* 반응형 처리 */
        @media (max-width: 1024px) {
            body { flex-direction: column; }
            .container { flex-direction: column; }
            aside.profile-area { 
                width: 100%; 
                height: auto;
